<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ff8d3a">
<title>一宮市 給食レシピ</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <button id="back-btn" class="back-btn" hidden aria-label="一覧に戻る">‹ 一覧</button>
  <h1 class="title">一宮の給食レシピ</h1>
  <button id="menu-tab" class="menu-tab" aria-label="献立表から探す" title="献立表から料理名を探す">📅</button>
  <button id="fav-tab" class="fav-tab" aria-label="お気に入り">★</button>
</header>

<!-- LIST VIEW -->
<main id="list-view" class="view">
  <!-- Today's lunch banner -->
  <div id="today-banner" class="today-banner">
    <div class="today-banner-header">
      <span class="today-banner-label">📅 今日の給食</span>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <span id="today-banner-date" class="today-banner-date"></span>
        <div class="today-banner-nav">
          <button id="banner-prev" class="banner-nav-btn" aria-label="前の日">‹</button>
          <button id="banner-next" class="banner-nav-btn" aria-label="次の日">›</button>
        </div>
      </div>
    </div>
    <div id="today-banner-body" class="today-banner-body"></div>
  </div>

  <div class="search-area">
    <input id="search-input" type="search" placeholder="料理名や材料で検索（例: ひじき、カレー）" autocomplete="off">
    <button id="clear-search" class="clear-btn" hidden aria-label="検索をクリア">×</button>
  </div>

  <div class="filter-bar" id="filter-bar"></div>

  <div class="result-count" id="result-count"></div>
  <ul id="recipe-list" class="recipe-grid"></ul>

  <div id="empty-state" class="empty-state" hidden>
    <p>該当するレシピが見つかりませんでした。</p>
    <p>別のキーワードでもう一度お試しください。</p>
  </div>
</main>

<!-- DETAIL VIEW -->
<main id="detail-view" class="view" hidden>
  <article id="detail-content" class="detail"></article>
</main>

<!-- MENU SEARCH VIEW -->
<main id="menu-view" class="view" hidden>
  <div class="menu-search">
    <h2 class="section-h">📅 献立表から料理を探す</h2>
    <p class="hint">給食で食べた料理を「日付」と「使われていた食材」から探せます。</p>

    <label class="field">
      <span>日付</span>
      <input id="menu-date" type="date">
    </label>

    <label class="field">
      <span>学校種別</span>
      <select id="menu-school">
        <option value="">すべて</option>
        <option value="小学校">小学校</option>
        <option value="中学校">中学校</option>
      </select>
    </label>

    <label class="field">
      <span>食材キーワード（空白区切りでAND検索）</span>
      <input id="menu-ingredients" type="text" placeholder="例: ほうれん草 コーン">
    </label>

    <div id="menu-results" class="menu-results"></div>
  </div>
</main>

<footer class="footer">
  <p>レシピ提供: <a href="https://www.city.ichinomiya.aichi.jp/kyouiku/gakkoukyuushoku/1000162/1001639.html" target="_blank" rel="noopener">一宮市教育委員会</a></p>
  <p class="footer-note">分量は学校の給食をもとに作成した目安です。お好みに合わせて調節してください。</p>
</footer>

<script src="data.js?v=4"></script>
<script src="menus.js?v=4"></script>
<script src="app.js?v=4"></script>
</body>
</html>
